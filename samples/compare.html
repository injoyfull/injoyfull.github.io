<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>인조이풀 — v1 vs v2 비교</title>
<style>
  :root{ --blue:#0066B3; --ink:#141414; --soft:#6B6B6B; --line:#E3E1DC; }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:#F4F3F0;color:var(--ink);
    font-family:"Noto Sans KR","Apple SD Gothic Neo",sans-serif;
    display:flex;flex-direction:column;overflow:hidden}

  header{background:#fff;border-bottom:1px solid var(--line);
    padding:.7rem 1rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;flex:0 0 auto}
  header h1{margin:0;font-size:.95rem;font-weight:700;letter-spacing:.02em}
  header p{margin:0;font-size:.78rem;color:var(--soft)}

  /* 모바일 탭 */
  .tabs{display:flex;gap:.4rem;margin-left:auto}
  .tabs label{font-size:.82rem;font-weight:500;padding:.42em 1em;border-radius:999px;
    border:1px solid var(--line);cursor:pointer;background:#fff;white-space:nowrap}
  #a:checked~header .tabs label[for=a],
  #b:checked~header .tabs label[for=b]{background:var(--blue);color:#fff;border-color:var(--blue)}
  input[name=v]{position:absolute;opacity:0;pointer-events:none}

  .stage{flex:1 1 auto;display:flex;min-height:0;gap:1px;background:var(--line)}
  .pane{flex:1 1 0;min-width:0;display:flex;flex-direction:column;background:#fff}
  .pane > b{flex:0 0 auto;font-size:.75rem;letter-spacing:.14em;padding:.5rem .9rem;
    background:#fff;border-bottom:1px solid var(--line);color:var(--soft);font-weight:700}
  .pane > b span{color:var(--ink)}
  .pane iframe{flex:1 1 auto;width:100%;border:0;display:block}

  /* 좁은 화면: 한 번에 하나만 */
  @media (max-width:820px){
    #a:checked~.stage .pane--b,
    #b:checked~.stage .pane--a{display:none}
  }
  @media (min-width:821px){ .tabs{display:none} }
</style>
</head>
<body>
<input type="radio" name="v" id="a" checked>
<input type="radio" name="v" id="b">

<header>
  <h1>인조이풀 — v1 vs v2</h1>
  <p>같은 내용, 다른 옷. 좁은 화면에서는 탭으로 전환됩니다.</p>
  <div class="tabs">
    <label for="a">v1 현재</label>
    <label for="b">v2 시안</label>
  </div>
</header>

<div class="stage">
  <div class="pane pane--a">
    <b>V1 — <span>지금 라이브</span> · 갤러리 화이트</b>
    <iframe src="/?compare=1" title="v1 현재 사이트" loading="eager"></iframe>
  </div>
  <div class="pane pane--b">
    <b>V2 — <span>시안</span> · 움직이는 메시지 · 비대칭</b>
    <iframe src="/samples/v2.html" title="v2 시안" loading="eager"></iframe>
  </div>
</div>
</body>
</html>
